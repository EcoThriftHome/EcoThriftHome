name: Add Internal Links

on:
  workflow_dispatch:

jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CLAUDE_PAT }}

      - name: Add internal links to blog posts
        run: |
          pip install anthropic --quiet
          python3 << 'PYEOF'
          import os, re, time, json
          import anthropic

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          POST_MAP = [
            {"slug":"led-bulb-upgrade-save-200-per-year.html","title":"The $30 LED Upgrade That Cuts Your Lighting Bill by 80%","topics":["LED","bulbs","lighting","electricity"]},
            {"slug":"smart-thermostat-habits-save-180-per-year.html","title":"Smart Thermostat Habits That Save $180/Year","topics":["thermostat","heating","cooling","HVAC"]},
            {"slug":"stop-vampire-power-save-150-per-year.html","title":"The Vampire Power Problem","topics":["vampire power","phantom load","standby","electronics"]},
            {"slug":"smart-power-strips-stop-phantom-power.html","title":"Smart Power Strips: Stop Phantom Power","topics":["power strip","phantom power","standby"]},
            {"slug":"weatherstripping-door-seals-stop-drafts.html","title":"Weatherstripping and Door Seals","topics":["drafts","air sealing","doors","windows"]},
            {"slug":"low-flow-showerheads-save-water-heating.html","title":"Low-Flow Showerheads","topics":["showerhead","water heating","bathroom"]},
            {"slug":"energy-efficient-window-treatments-curtains.html","title":"Energy Efficient Window Treatments and Curtains","topics":["curtains","windows","blinds","heat loss"]},
            {"slug":"unplug-phone-charger-save-energy-money.html","title":"Does Unplugging Phone Chargers Save Money?","topics":["charger","phantom power","standby","plugs"]},
            {"slug":"cold-water-laundry-washing-savings.html","title":"Cold Water Laundry: Save $120/Year","topics":["laundry","washing machine","appliances","water heating"]},
            {"slug":"ceiling-fans-vs-air-conditioning-costs.html","title":"Ceiling Fans vs Air Conditioning","topics":["ceiling fan","AC","air conditioning","cooling"]},
            {"slug":"programmable-vs-smart-thermostat-comparison.html","title":"Programmable vs Smart Thermostat","topics":["thermostat","smart thermostat","heating","cooling"]},
            {"slug":"diy-home-energy-audit-step-by-step.html","title":"How to Do a DIY Home Energy Audit","topics":["energy audit","air leaks","insulation","drafts"]},
            {"slug":"solar-phone-chargers-small-devices.html","title":"Solar Phone Chargers for Small Devices","topics":["solar","charger","renewable energy"]},
            {"slug":"best-power-usage-monitors-track-electricity.html","title":"Best Power Usage Monitors to Track Electricity","topics":["energy monitor","electricity tracking","power meter"]},
            {"slug":"best-smart-power-strips-2025.html","title":"Best Smart Power Strips in 2025: Ranked and Reviewed","topics":["power strip","smart outlet","phantom power"]},
            {"slug":"insulate-water-heater-save-money.html","title":"How to Insulate Your Water Heater","topics":["water heater","insulation","hot water"]},
            {"slug":"sense-energy-monitor-review-save-money-tracking-electricity.html","title":"Sense Energy Monitor Review","topics":["energy monitor","electricity tracking","smart home"]},
            {"slug":"thermal-curtains-cellular-shades-cut-heating-cooling-bills.html","title":"Thermal Curtains and Cellular Shades","topics":["curtains","cellular shades","windows","insulation","heating","cooling"]},
            {"slug":"heat-pump-water-heater-vs-traditional-savings.html","title":"Heat Pump Water Heater vs Traditional","topics":["heat pump","water heater","hot water","energy efficient"]},
            {"slug":"mini-split-vs-window-ac-vs-central-air-cost-comparison.html","title":"Mini Split vs Window AC vs Central Air","topics":["mini split","window AC","central air","HVAC","cooling"]},
          ]

          blog_dir = "blog"
          total_added = 0

          for post in POST_MAP:
              filepath = os.path.join(blog_dir, post["slug"])
              if not os.path.exists(filepath):
                  print("Skipping (not found): " + post["slug"])
                  continue

              with open(filepath, "r", encoding="utf-8") as fh:
                  original = fh.read()

              other_posts = [p for p in POST_MAP if p["slug"] != post["slug"]]
              other_list = "\n".join([
                  "- slug: " + p["slug"] + ', title: "' + p["title"] + '", topics: ' + ", ".join(p["topics"])
                  for p in other_posts
              ])

              # Extract only paragraph text for analysis (keep token count low)
              paragraphs = re.findall(r'<p[^>]*>(.*?)</p>', original, re.DOTALL)
              # Skip very short paragraphs and ones inside product-rec divs
              para_text = "\n---\n".join([
                  re.sub(r'<[^>]+>', '', p).strip()
                  for p in paragraphs
                  if len(re.sub(r'<[^>]+>', '', p).strip()) > 80
              ])[:4000]

              prompt = (
                  'You are an SEO specialist adding internal links to a blog post on EcoThrift Home.\n\n'
                  'Current post: "' + post["title"] + '"\n\n'
                  'Available posts to link to:\n' + other_list + '\n\n'
                  'Paragraph text from the article:\n' + para_text + '\n\n'
                  'TASK: Identify up to 4 places where an internal link would fit naturally.\n'
                  'For each link, provide:\n'
                  '1. "search_text": a unique phrase (10-20 words) from the paragraph where the link should go\n'
                  '2. "anchor_text": the exact words within that phrase to make into a link (2-6 words)\n'
                  '3. "slug": the slug of the post to link to\n\n'
                  'RULES:\n'
                  '- Only link where it genuinely helps the reader\n'
                  '- Never use the same slug twice\n'
                  '- The anchor_text must be an exact substring of search_text\n'
                  '- The search_text must be unique enough to find exactly one match in the article\n'
                  '- If no links make sense, return empty array\n\n'
                  'Return ONLY valid JSON array, no explanation:\n'
                  '[{"search_text":"...","anchor_text":"...","slug":"..."}]'
              )

              try:
                  message = client.messages.create(
                      model="claude-sonnet-4-6",
                      max_tokens=1000,
                      messages=[{"role": "user", "content": prompt}]
                  )
                  raw = message.content[0].text.strip()

                  # Clean markdown fences
                  if raw.startswith("```"):
                      raw = re.sub(r'^```[a-z]*\n?', '', raw)
                      raw = re.sub(r'\n?```$', '', raw)
                      raw = raw.strip()

                  # Extract JSON array
                  match = re.search(r'\[.*\]', raw, re.DOTALL)
                  if not match:
                      print("No JSON returned for: " + post["slug"])
                      continue

                  links = json.loads(match.group(0))
                  if not links:
                      print("No links suggested for: " + post["slug"])
                      continue

                  # Apply links to original content (never replace full content)
                  modified = original
                  added = 0
                  used_slugs = set()

                  for link in links:
                      try:
                          search  = link.get("search_text", "").strip()
                          anchor  = link.get("anchor_text", "").strip()
                          slug    = link.get("slug", "").strip()

                          if not search or not anchor or not slug:
                              continue
                          if slug in used_slugs:
                              continue
                          if anchor not in search:
                              continue
                          # Make sure search text exists exactly once in document
                          if modified.count(search) != 1:
                              continue
                          # Make sure anchor is not already inside an <a> tag
                          idx = modified.find(search)
                          surrounding = modified[max(0,idx-200):idx+len(search)+200]
                          if '<a ' in surrounding[200-50:200+len(search)+50]:
                              continue

                          # Build the replacement — wrap just the anchor text in a link
                          linked_anchor = '<a href="/blog/' + slug + '">' + anchor + '</a>'
                          new_search = search.replace(anchor, linked_anchor, 1)
                          modified = modified.replace(search, new_search, 1)
                          used_slugs.add(slug)
                          added += 1

                      except Exception as e:
                          print("  Link error: " + str(e))
                          continue

                  if added > 0:
                      # Safety check — make sure file isn't shorter than original
                      if len(modified) >= len(original):
                          with open(filepath, "w", encoding="utf-8") as fh:
                              fh.write(modified)
                          total_added += added
                          print("Added " + str(added) + " link(s) to: " + post["slug"])
                      else:
                          print("Safety check failed (content shorter) - skipping: " + post["slug"])
                  else:
                      print("No valid links applied to: " + post["slug"])

              except Exception as e:
                  print("Error on " + post["slug"] + ": " + str(e))

              time.sleep(3)

          print("Done. Total internal links added: " + str(total_added))
          PYEOF
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit internal links
        run: |
          git config user.email "claude-bot@ecothrifthome.com"
          git config user.name "Claude Bot"
          git add blog/
          git diff --staged --quiet || git commit -m "SEO: add contextual internal links to blog posts"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.CLAUDE_PAT }}
