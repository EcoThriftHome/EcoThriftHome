name: Auto Blog Post

on:
  schedule:
    - cron: '0 14 * * 1,3,5'
  workflow_dispatch:
    inputs:
      filename:
        description: 'Raw Gist URL of the file'
        required: false
      postname:
        description: 'File name to save as (e.g. my-post.html)'
        required: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CLAUDE_PAT }}

      - name: Pick next topic
        id: topic
        if: ${{ !inputs.filename }}
        run: |
          TOPIC=$(grep -v '^#' topics.txt | grep -v '^$' | head -1)
          echo "topic=$TOPIC" >> $GITHUB_OUTPUT
          sed -i "0,/^${TOPIC}/s/^${TOPIC}/# done: ${TOPIC}/" topics.txt
          echo "Picked topic: $TOPIC"

      - name: Generate post with Claude
        id: generate
        if: ${{ !inputs.filename }}
        run: |
          pip install anthropic --quiet

          python3 << 'PYEOF'
          import anthropic, re, os
          from datetime import date

          topic = os.environ["TOPIC"]
          today = date.today().strftime("%Y-%m-%d")
          today_nice = date.today().strftime("%B %-d, %Y")

          prompt = f"""You are a content writer for EcoThrift Home (ecothrifthome.com), a blog about evidence-based, budget-first energy saving tips for homeowners. Tone: practical, friendly, data-driven. Never salesy.

          Write a complete, publish-ready HTML blog post about: {topic}

          Published date: {today} ({today_nice})
          Canonical URL: https://ecothrifthome.com/blog/SLUG.html (replace SLUG with a descriptive slug)

          YOU MUST USE THESE EXACT HTML STRUCTURES — DO NOT INVENT YOUR OWN:

          HEAD (copy exactly, only change title/meta content):
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
          <link rel="stylesheet" href="../css/style.css">
          <script async src="https://www.googletagmanager.com/gtag/js?id=G-VMP2LEKHG1"></script>
          <script>window.dataLayer=window.dataLayer||[];function gtag(){{dataLayer.push(arguments);}}gtag("js",new Date());gtag("config","G-VMP2LEKHG1");</script>
          <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8063778947792419" crossorigin="anonymous"></script>

          HEADER (copy exactly):
          <header class="site-header" role="banner">
            <div class="container">
              <div class="header-inner">
                <a href="/" class="logo" aria-label="EcoThrift Home - Homepage">
                  <span class="logo-icon" aria-hidden="true">🌿</span>
                  <div class="logo-text">
                    <span class="logo-name">EcoThrift Home</span>
                    <span class="logo-tagline">Save Energy. Save Money.</span>
                  </div>
                </a>
                <button class="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="main-nav">
                  <span></span><span></span><span></span>
                </button>
                <nav id="main-nav" class="main-nav" role="navigation" aria-label="Main navigation">
                  <ul role="list">
                    <li><a href="/">Home</a></li>
                    <li><a href="/#blog-posts">Blog Posts</a></li>
                    <li><a href="/#savings-calculator">Savings Calculator</a></li>
                    <li><a href="/#top-products">Top Products</a></li>
                    <li><a href="/about.html">About</a></li>
                    <li><a href="/contact.html">Contact</a></li>
                  </ul>
                </nav>
              </div>
            </div>
          </header>

          POST HERO (copy structure exactly):
          <div class="post-hero">
            <div class="container">
              <nav class="post-breadcrumb" aria-label="Breadcrumb">
                <a href="/">Home</a>
                <span class="sep" aria-hidden="true">›</span>
                <a href="/#blog-posts">Blog</a>
                <span class="sep" aria-hidden="true">›</span>
                <span aria-current="page">[SHORT TITLE]</span>
              </nav>
              <div class="post-meta">
                <span class="post-category">[CATEGORY]</span>
                <span class="post-date"><time datetime="{today}">{today_nice}</time></span>
                <span class="post-read-time">[X] min read</span>
              </div>
              <h1>[FULL H1 TITLE]</h1>
              <p class="post-subtitle">[SUBTITLE]</p>
              <div class="post-hero-stats" aria-label="Key statistics">
                <div class="stat"><span class="stat-value">[VALUE]</span><span class="stat-label">[LABEL]</span></div>
                <div class="stat"><span class="stat-value">[VALUE]</span><span class="stat-label">[LABEL]</span></div>
                <div class="stat"><span class="stat-value">[VALUE]</span><span class="stat-label">[LABEL]</span></div>
              </div>
            </div>
          </div>

          MAIN LAYOUT (copy exactly):
          <div class="post-layout container">
            <article class="post-content" id="article-main">
              [ARTICLE CONTENT HERE]
            </article>
            <aside class="post-sidebar" aria-label="Related posts and resources">
              [SIDEBAR HERE]
            </aside>
          </div>

          AMAZON PRODUCT CARDS (copy exactly, use this structure for every product):
          <div class="product-rec" itemscope itemtype="https://schema.org/Product">
            <meta itemprop="image" content="https://ecothrifthome.com/images/placeholder-product.jpg">
            <meta itemprop="brand" content="[BRAND NAME]">
            <meta itemprop="sku" content="[PRODUCT-SLUG]">
            <h4 itemprop="name">🥇 [PRODUCT NAME]</h4>
            <p itemprop="description">[DESCRIPTION]</p>
            <div class="product-rec-meta">
              <span class="rec-price" itemprop="offers" itemscope itemtype="https://schema.org/Offer">
                <meta itemprop="availability" content="https://schema.org/InStock">
                <meta itemprop="url" content="https://www.amazon.com/s?k=[URL-ENCODED-PRODUCT-NAME]&tag=stangandco0b-20">
                <meta itemprop="priceCurrency" content="USD">
                <meta itemprop="price" content="[PRICE AS NUMBER ONLY e.g. 45]">
                <span>~$[PRICE AS NUMBER ONLY e.g. 45]</span>
              </span>
              <span class="rec-savings">[SAVINGS STAT]</span>
            </div>
            <a href="https://www.amazon.com/s?k=[URL-ENCODED-PRODUCT-NAME]&tag=stangandco0b-20"
               class="btn btn-amazon"
               rel="nofollow sponsored noopener noreferrer"
               target="_blank"
               aria-label="Buy [PRODUCT] on Amazon (affiliate link, opens in new tab)">
              <i class="fab fa-amazon" aria-hidden="true"></i> Check Price on Amazon
            </a>
          </div>

          SIDEBAR (copy exactly):
          <div class="sidebar-widget">
            <h4>Related Posts</h4>
            <div class="sidebar-posts">
              <div class="sidebar-post">
                <a href="led-bulb-upgrade-save-200-per-year.html">
                  <span class="sidebar-post-icon" aria-hidden="true">💡</span>
                  <div><h5>The $30 LED Upgrade That Cuts Your Lighting Bill by 80%</h5><p>Saves up to $200/yr</p></div>
                </a>
              </div>
              <div class="sidebar-post">
                <a href="smart-thermostat-habits-save-180-per-year.html">
                  <span class="sidebar-post-icon" aria-hidden="true">🌡️</span>
                  <div><h5>Smart Thermostat Habits That Save $180/Year</h5><p>Saves up to $180/yr</p></div>
                </a>
              </div>
              <div class="sidebar-post">
                <a href="smart-power-strips-stop-phantom-power.html">
                  <span class="sidebar-post-icon" aria-hidden="true">🔌</span>
                  <div><h5>Smart Power Strips: Stop Phantom Power</h5><p>Saves up to $100/yr</p></div>
                </a>
              </div>
            </div>
          </div>
          <div class="sidebar-widget">
            <h4>Quick Savings Facts</h4>
            <ul style="list-style:none; display:flex; flex-direction:column; gap:.625rem;">
              <li style="font-size:.875rem; color:var(--gray-700);"><strong style="color:var(--green-700);">[STAT VALUE]</strong> [STAT LABEL]</li>
              <li style="font-size:.875rem; color:var(--gray-700);"><strong style="color:var(--green-700);">[STAT VALUE]</strong> [STAT LABEL]</li>
              <li style="font-size:.875rem; color:var(--gray-700);"><strong style="color:var(--green-700);">[STAT VALUE]</strong> [STAT LABEL]</li>
              <li style="font-size:.875rem; color:var(--gray-700);"><strong style="color:var(--green-700);">[STAT VALUE]</strong> [STAT LABEL]</li>
              <li style="font-size:.875rem; color:var(--gray-700);"><strong style="color:var(--green-700);">[STAT VALUE]</strong> [STAT LABEL]</li>
            </ul>
          </div>
          <div class="post-cta-box">
            <h4>Calculate Your Savings</h4>
            <p>See how much your household can save with our free calculator.</p>
            <a href="/#savings-calculator" class="btn btn-primary">Open Calculator</a>
          </div>

          FOOTER (copy exactly):
          <footer class="site-footer" role="contentinfo">
            <div class="container">
              <div class="footer-grid">
                <div class="footer-brand">
                  <a href="/" class="logo footer-logo" aria-label="EcoThrift Home">
                    <span aria-hidden="true">🌿</span>
                    <div><span class="logo-name">EcoThrift Home</span><span class="logo-tagline">Save Energy. Save Money.</span></div>
                  </a>
                  <p>Evidence-based, budget-first energy saving tips for every home.</p>
                </div>
                <nav class="footer-nav" aria-label="Footer navigation">
                  <h3>Explore</h3>
                  <ul role="list">
                    <li><a href="/">Home</a></li>
                    <li><a href="/#blog-posts">Blog Posts</a></li>
                    <li><a href="/#top-products">Top Products</a></li>
                    <li><a href="/#faq">FAQs</a></li>
                  </ul>
                </nav>
                <nav class="footer-nav" aria-label="Company navigation">
                  <h3>Company</h3>
                  <ul role="list">
                    <li><a href="/about.html">About</a></li>
                    <li><a href="/contact.html">Contact</a></li>
                    <li><a href="/about.html#affiliate-disclosure">Disclosure</a></li>
                    <li><a href="/privacy.html">Privacy</a></li>
                  </ul>
                </nav>
                <div class="footer-social">
                  <h3>Follow</h3>
                  <div class="social-links">
                    <a href="https://pinterest.com/ecothrifthome" rel="noopener noreferrer" target="_blank" aria-label="Pinterest"><i class="fab fa-pinterest" aria-hidden="true"></i></a>
                  </div>
                </div>
              </div>
              <div class="footer-bottom">
                <p class="affiliate-disclosure"><strong>Affiliate Disclosure:</strong> EcoThrift Home is a participant in the Amazon Services LLC Associates Program. As an Amazon Associate, we earn from qualifying purchases at no extra cost to you.</p>
                <p class="copyright">&copy; <span id="current-year"></span> EcoThrift Home. All rights reserved.</p>
              </div>
            </div>
          </footer>
          <script src="../js/main.js"></script>

          ALSO REQUIRED:
          - Include Article + FAQ + Breadcrumb schema.org JSON-LD in <head>
          - Key takeaway box: <div class="key-takeaway" role="note"><strong>Key Takeaway:</strong> [ONE SENTENCE]</div>
          - A savings comparison <table class="savings-table"> with thead and tbody
          - An authoritative <blockquote> citing EPA, DOE, or ENERGY STAR
          - Affiliate disclosure paragraph before closing article tag
          - 1200-1800 words of body content

          Return ONLY the raw HTML. No explanation, no markdown fences. Start with <!DOCTYPE html> and end with </html>."""

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          message = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=8000,
              messages=[{"role": "user", "content": prompt}]
          )

          html = message.content[0].text.strip()

          match = re.search(r'ecothrifthome\.com/blog/([a-z0-9-]+)\.html', html)
          slug = match.group(1) if match else f"post-{today}"
          filename = f"{slug}.html"

          with open(f"blog/{filename}", "w") as f:
              f.write(html)

          with open("/tmp/post_filename.txt", "w") as f:
              f.write(filename)

          print(f"Generated: {filename}")
          PYEOF
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC: ${{ steps.topic.outputs.topic }}

      - name: Download manual post
        if: ${{ inputs.filename }}
        run: |
          curl -L "${{ inputs.filename }}" -o "blog/${{ inputs.postname }}"
          echo "${{ inputs.postname }}" > /tmp/post_filename.txt
          echo "Downloaded: ${{ inputs.postname }}"

      - name: Update homepage
        run: |
          python3 << 'PYEOF'
          import re, os
          from datetime import date

          filename = open("/tmp/post_filename.txt").read().strip()
          slug = filename.replace(".html", "")
          today = date.today().strftime("%Y-%m-%d")
          today_nice = date.today().strftime("%B %-d, %Y")

          with open(f"blog/{filename}") as f:
              post_html = f.read()

          title_match = re.search(r'<h1[^>]*>(.+?)</h1>', post_html, re.DOTALL)
          desc_match  = re.search(r'<meta name="description" content="([^"]+)"', post_html)
          cat_match   = re.search(r'<span class="post-category"[^>]*>([^<]+)</span>', post_html)
          save_match  = re.search(r'Save up to \$?([\d,]+)', post_html)
          read_match  = re.search(r'(\d+) min read', post_html)

          title    = re.sub(r'<[^>]+>', '', title_match.group(1)).strip() if title_match else slug.replace("-", " ").title()
          desc     = desc_match.group(1) if desc_match else "A practical guide to saving energy and money at home."
          category = cat_match.group(1).strip() if cat_match else "Energy Saving"
          savings  = save_match.group(1) if save_match else "100"
          readtime = read_match.group(1) if read_match else "6"

          emoji_map = {
              "light": "💡", "bulb": "💡",
              "heat": "🌡️", "cool": "🌡️", "thermo": "🌡️",
              "power": "🔌", "strip": "🔌", "phantom": "🔌", "vampire": "🧛",
              "water": "🚰", "shower": "🚰",
              "window": "🪟", "draft": "🌬️", "seal": "🌬️",
              "solar": "☀️", "panel": "☀️",
              "washer": "🫧", "laundry": "🫧",
              "fridge": "🧊", "freezer": "🧊",
          }
          emoji = "⚡"
          for keyword, icon in emoji_map.items():
              if keyword in title.lower():
                  emoji = icon
                  break

          new_card = (
              '\n          <!-- Post: ' + slug + ' -->\n'
              '          <article class="post-card" role="listitem" itemscope itemtype="https://schema.org/Article">\n'
              '            <a href="blog/' + filename + '" class="post-card-link" aria-label="Read: ' + title + '">\n'
              '              <div class="post-card-img" aria-hidden="true">\n'
              '                <span class="post-icon">' + emoji + '</span>\n'
              '                <div class="savings-badge">Save up to $' + savings + '/yr</div>\n'
              '              </div>\n'
              '              <div class="post-card-body">\n'
              '                <div class="post-meta">\n'
              '                  <span class="post-category">' + category + '</span>\n'
              '                  <time datetime="' + today + '" itemprop="datePublished">' + today_nice + '</time>\n'
              '                </div>\n'
              '                <h3 itemprop="headline">' + title + '</h3>\n'
              '                <p itemprop="description">' + desc + '</p>\n'
              '                <div class="post-footer">\n'
              '                  <span class="read-time"><i class="far fa-clock" aria-hidden="true"></i> ' + readtime + ' min read</span>\n'
              '                  <span class="read-more" aria-hidden="true">Read Guide →</span>\n'
              '                </div>\n'
              '              </div>\n'
              '            </a>\n'
              '          </article>\n'
          )

          with open("index.html") as f:
              index = f.read()

          updated = index.replace(
              '   </div><!-- /.posts-grid -->',
              new_card + '   </div><!-- /.posts-grid -->'
          )

          with open("index.html", "w") as f:
              f.write(updated)

          print(f"Homepage updated with card for: {filename}")
          PYEOF


      - name: Generate and post 2 Pinterest pins
        run: |
          pip install anthropic Pillow requests --quiet
          python3 << 'PINEOF'
          import anthropic, re, os, json, time, math, random
          from PIL import Image, ImageDraw, ImageFont
          from io import BytesIO
          import requests

          filename = open("/tmp/post_filename.txt").read().strip()
          slug = filename.replace(".html", "")

          with open(f"blog/{filename}") as f:
              post_html = f.read()

          title_match = re.search(r'<h1[^>]*>(.+?)</h1>', post_html, re.DOTALL)
          desc_match  = re.search(r'<meta name="description" content="([^"]+)"', post_html)
          save_match  = re.search(r'Save up to \$?([\d,]+)', post_html)

          title    = re.sub(r'<[^>]+>', '', title_match.group(1)).strip() if title_match else slug.replace("-", " ").title()
          desc     = desc_match.group(1) if desc_match else "Save money on energy at home."
          savings  = save_match.group(1) if save_match else "100"
          post_url = f"https://ecothrifthome.com/blog/{filename}"

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          pin_prompt = (
              "Write 2 Pinterest pins for this EcoThrift Home blog post.\n"
              f"Title: {title}\nDescription: {desc}\nSavings: ${savings}/yr\nURL: {post_url}\n\n"
              "Pin 1: Lead with the savings amount, money-focused angle\n"
              "Pin 2: Lead with how-it-works, educational angle\n\n"
              "Each pin needs: headline (under 8 words), subheading (under 10 words), description (2-3 sentences + hashtags), eyebrow (2-3 word category label)\n\n"
              'Return ONLY valid JSON, no explanation:\n'
              '[{"headline":"...","subheading":"...","description":"...","eyebrow":"..."},{"headline":"...","subheading":"...","description":"...","eyebrow":"..."}]'
          )

          message = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=800,
              messages=[{"role": "user", "content": pin_prompt}]
          )

          raw = message.content[0].text.strip()
          print(f"Claude pin response: {raw[:200]}")

          if raw.startswith("```"):
              raw = re.sub(r'^```[a-z]*\n?', '', raw)
              raw = re.sub(r'\n?```$', '', raw)
              raw = raw.strip()

          match = re.search(r'\[.*\]', raw, re.DOTALL)
          if match:
              raw = match.group(0)

          pins = json.loads(raw)

          PALETTES = [
              {"bg": "#0F6E56", "accent": "#5DCAA5", "dark": "#085041", "text": "#E1F5EE", "muted": "#9FE1CB"},
              {"bg": "#1C1C1E", "accent": "#EF9F27", "dark": "#2C2C2A", "text": "#F1EFE8", "muted": "#888780"},
          ]

          def wrap_text(draw, text, font, max_width):
              words = text.split()
              lines, current = [], ""
              for word in words:
                  test = (current + " " + word).strip()
                  if draw.textbbox((0,0), test, font=font)[2] <= max_width:
                      current = test
                  else:
                      if current: lines.append(current)
                      current = word
              if current: lines.append(current)
              return lines

          def lf(path, size):
              try:
                  return ImageFont.truetype(path, size)
              except:
                  return ImageFont.load_default()

          BOLD = "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          REG  = "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"

          def draw_water_heater(d, cx, cy, p):
              d.rounded_rectangle([cx-120, cy-200, cx+120, cy+200], radius=60, fill=p["dark"])
              d.rounded_rectangle([cx-100, cy-180, cx+100, cy+180], radius=50, fill="#4A7FA5")
              d.rectangle([cx-20, cy-260, cx+20, cy-195], fill="#888")
              d.ellipse([cx-30, cy-275, cx+30, cy-255], fill="#999")
              d.rectangle([cx-50, cy+195, cx-20, cy+260], fill="#888")
              d.rectangle([cx+20, cy+195, cx+50, cy+260], fill="#888")
              d.rounded_rectangle([cx-60, cy-80, cx+60, cy+20], radius=10, fill=p["accent"])
              d.ellipse([cx-30, cy-60, cx+30, cy], fill=p["dark"])
              d.ellipse([cx-18, cy-48, cx+18, cy-12], fill="#EF9F27")
              d.text((cx-24, cy+30), "HOT", font=lf(BOLD, 22), fill="#E1F5EE")
              for sx, so in [(-40, 0), (0, -15), (40, 0)]:
                  for j in range(3):
                      y1 = cy - 290 - j*22
                      d.line([(cx+sx, y1), (cx+sx+so, y1-16)], fill="#9FE1CB", width=3)

          def draw_lightbulb(d, cx, cy, p):
              for r, col in [(160,"#1a3a2a"),(130,"#1f4a32"),(100,"#2a6040")]:
                  d.ellipse([cx-r, cy-r, cx+r, cy+r], fill=col)
              d.ellipse([cx-90, cy-110, cx+90, cy+70], fill="#FAEEDA")
              d.ellipse([cx-75, cy-95, cx+75, cy+55], fill="#FFFDE7")
              d.rounded_rectangle([cx-45, cy+55, cx+45, cy+130], radius=8, fill="#B4B2A9")
              d.rectangle([cx-40, cy+65, cx+40, cy+90], fill="#888")
              d.rectangle([cx-40, cy+95, cx+40, cy+115], fill="#888")
              for fx in [-20, 0, 20]:
                  d.line([(cx+fx, cy-40), (cx+fx, cy+20)], fill="#EF9F27", width=3)
              d.line([(cx-20, cy-40), (cx+20, cy-40)], fill="#EF9F27", width=3)
              d.line([(cx-20, cy+20), (cx+20, cy+20)], fill="#EF9F27", width=3)
              for angle in range(0, 360, 45):
                  rad = math.radians(angle)
                  d.line([(cx+int(100*math.cos(rad)), cy-20+int(100*math.sin(rad))),
                          (cx+int(130*math.cos(rad)), cy-20+int(130*math.sin(rad)))], fill="#EF9F27", width=4)

          def draw_thermostat(d, cx, cy, p):
              d.rounded_rectangle([cx-130, cy-180, cx+130, cy+180], radius=30, fill=p["dark"])
              d.rounded_rectangle([cx-115, cy-165, cx+115, cy+165], radius=25, fill="#1a2d4a")
              d.rounded_rectangle([cx-90, cy-120, cx+90, cy+80], radius=15, fill="#0a1628")
              d.text((cx-60, cy-100), "68F", font=lf(BOLD, 72), fill="#5DCAA5")
              d.text((cx-55, cy-20), "SAVING MODE", font=lf(REG, 22), fill="#888780")
              d.rounded_rectangle([cx-70, cy+10, cx+70, cy+30], radius=8, fill="#0F6E56")
              d.text((cx-52, cy+13), "SAVE $180/yr", font=lf(REG, 16), fill="#9FE1CB")
              d.ellipse([cx-50, cy+100, cx-10, cy+140], fill=p["accent"])
              d.ellipse([cx+10, cy+100, cx+50, cy+140], fill="#2C2C2A")
              d.text((cx-36, cy+112), "+", font=lf(BOLD, 32), fill=p["dark"])
              d.text((cx+18, cy+112), "-", font=lf(BOLD, 32), fill="#888780")

          def draw_power_strip(d, cx, cy, p):
              d.rounded_rectangle([cx-200, cy-50, cx+200, cy+50], radius=20, fill="#2C2C2A")
              d.rounded_rectangle([cx-185, cy-35, cx+185, cy+35], radius=15, fill="#1C1C1E")
              for ox in [-130, -50, 30, 110]:
                  d.rounded_rectangle([cx+ox-25, cy-22, cx+ox+25, cy+22], radius=6, fill="#333")
                  d.ellipse([cx+ox-12, cy-14, cx+ox-4, cy-4], fill="#555")
                  d.ellipse([cx+ox+4, cy-14, cx+ox+12, cy-4], fill="#555")
                  d.rounded_rectangle([cx+ox-8, cy+2, cx+ox+8, cy+14], fill="#555", radius=3)
              d.ellipse([cx+155, cy-18, cx+185, cy+18], fill="#0F6E56")
              d.text((cx+161, cy-10), "ON", font=lf(BOLD, 18), fill="#E1F5EE")
              d.line([(cx-200, cy), (cx-240, cy), (cx-240, cy+80)], fill="#555", width=8)
              d.rounded_rectangle([cx-240, cy+70, cx-200, cy+120], radius=6, fill="#444")
              d.rounded_rectangle([cx-80, cy+80, cx+80, cy+140], radius=14, fill=p["accent"])
              d.text((cx-60, cy+95), "KILLS PHANTOM", font=lf(BOLD, 20), fill=p["dark"])
              d.text((cx-38, cy+120), "POWER", font=lf(BOLD, 20), fill=p["dark"])

          def draw_solar_panel(d, cx, cy, p):
              d.rounded_rectangle([cx-180, cy-130, cx+180, cy+130], radius=10, fill="#1a1a2e")
              d.rounded_rectangle([cx-168, cy-118, cx+168, cy+118], radius=8, fill="#0d1b4b")
              for row in range(3):
                  for col in range(4):
                      px = cx - 150 + col * 78
                      py = cy - 90 + row * 72
                      d.rounded_rectangle([px, py, px+68, py+62], radius=4, fill="#1a3a6e")
                      d.rounded_rectangle([px+4, py+4, px+64, py+58], radius=3, fill="#0a2456")
                      d.line([(px+10, py+10), (px+25, py+10)], fill="#2a4a8e", width=2)
              sun_x, sun_y = cx+220, cy-220
              d.ellipse([sun_x-40, sun_y-40, sun_x+40, sun_y+40], fill="#EF9F27")
              for angle in range(0, 360, 40):
                  rad = math.radians(angle)
                  d.line([(sun_x+int(48*math.cos(rad)), sun_y+int(48*math.sin(rad))),
                          (sun_x+int(65*math.cos(rad)), sun_y+int(65*math.sin(rad)))], fill="#EF9F27", width=3)
              d.line([(sun_x-30, sun_y+30), (cx+140, cy-100)], fill="#EF9F27", width=3)
              d.rectangle([cx-15, cy+128, cx+15, cy+220], fill="#555")

          def draw_shower(d, cx, cy, p):
              d.rectangle([cx-8, cy-220, cx+8, cy-60], fill="#888")
              d.rounded_rectangle([cx-60, cy-240, cx+60, cy-210], radius=10, fill="#999")
              d.ellipse([cx-50, cy-80, cx+50, cy], fill="#777")
              d.ellipse([cx-40, cy-70, cx+40, cy-10], fill="#999")
              random.seed(42)
              for _ in range(20):
                  dx = random.randint(-80, 80)
                  dy = random.randint(20, 200)
                  d.ellipse([cx+dx-4, cy+dy-8, cx+dx+4, cy+dy+8], fill="#5DCAA5")

          def draw_curtains(d, cx, cy, p):
              d.rectangle([cx-160, cy-180, cx+160, cy+160], fill="#2C4A6E")
              d.rectangle([cx-145, cy-165, cx+145, cy+145], fill="#B5D4F4")
              sun_x, sun_y = cx, cy-80
              d.ellipse([sun_x-50, sun_y-50, sun_x+50, sun_y+50], fill="#EF9F27")
              for angle in range(0, 360, 45):
                  rad = math.radians(angle)
                  d.line([(sun_x+int(58*math.cos(rad)), sun_y+int(58*math.sin(rad))),
                          (sun_x+int(75*math.cos(rad)), sun_y+int(75*math.sin(rad)))], fill="#EF9F27", width=3)
              d.polygon([(cx-145,cy-165),(cx-50,cy-165),(cx-70,cy+145),(cx-145,cy+145)], fill="#0F6E56")
              d.polygon([(cx+50,cy-165),(cx+145,cy-165),(cx+145,cy+145),(cx+70,cy+145)], fill="#0F6E56")
              d.rectangle([cx-175, cy-190, cx+175, cy-175], fill="#888")
              d.ellipse([cx-185, cy-198, cx-165, cy-168], fill="#999")
              d.ellipse([cx+165, cy-198, cx+185, cy-168], fill="#999")

          def draw_house(d, cx, cy, p):
              d.rectangle([cx-160, cy-80, cx+160, cy+160], fill="#2C4A6E")
              d.polygon([(cx-190,cy-80),(cx,cy-240),(cx+190,cy-80)], fill=p["accent"])
              d.rounded_rectangle([cx-35, cy+40, cx+35, cy+160], radius=8, fill="#1a2d1a")
              d.ellipse([cx+18, cy+95, cx+28, cy+105], fill="#EF9F27")
              for wx in [-110, 60]:
                  d.rounded_rectangle([cx+wx, cy-40, cx+wx+70, cy+20], radius=6, fill="#B5D4F4")
                  d.line([(cx+wx+35, cy-40), (cx+wx+35, cy+20)], fill="#2C4A6E", width=3)
                  d.line([(cx+wx, cy-10), (cx+wx+70, cy-10)], fill="#2C4A6E", width=3)

          def detect_and_draw(d, slug, cx, cy, p):
              s = slug.lower()
              if any(k in s for k in ["water-heater","tankless","heat-pump-water"]):
                  draw_water_heater(d, cx, cy, p)
              elif any(k in s for k in ["led","bulb","lighting","light-switch"]):
                  draw_lightbulb(d, cx, cy, p)
              elif any(k in s for k in ["thermostat","hvac","heating","cooling","heat-pump","ceiling-fan","dehumidifier"]):
                  draw_thermostat(d, cx, cy, p)
              elif any(k in s for k in ["power-strip","phantom","vampire","plug","outlet","standby"]):
                  draw_power_strip(d, cx, cy, p)
              elif any(k in s for k in ["solar","panel","renewable"]):
                  draw_solar_panel(d, cx, cy, p)
              elif any(k in s for k in ["shower","showerhead","low-flow"]):
                  draw_shower(d, cx, cy, p)
              elif any(k in s for k in ["curtain","blind","window-treatment","shade","thermal"]):
                  draw_curtains(d, cx, cy, p)
              else:
                  draw_house(d, cx, cy, p)

          cloud_name    = os.environ["CLOUDINARY_CLOUD_NAME"]
          api_key       = os.environ["CLOUDINARY_API_KEY"]
          api_secret    = os.environ["CLOUDINARY_API_SECRET"]
          webhook_url_1 = os.environ["ZAPIER_WEBHOOK_URL"]
          webhook_url_2 = os.environ["ZAPIER_WEBHOOK_URL_2"]
          board_id      = "802977877252098630"

          for i, (pin, palette) in enumerate(zip(pins, PALETTES), 1):
              W, H = 1000, 1500
              img = Image.new("RGB", (W, H), palette["bg"])
              d = ImageDraw.Draw(img)

              # Subtle background grid
              for x in range(0, W, 80):
                  d.line([(x, 0), (x, H)], fill=palette["dark"], width=1)
              for y in range(0, H, 80):
                  d.line([(0, y), (W, y)], fill=palette["dark"], width=1)

              # Logo bar
              d.rectangle([0, 0, W, 92], fill=palette["dark"])
              d.text((40, 24), "EcoThrift Home", font=lf(BOLD, 30), fill=palette["accent"])
              url_w = d.textbbox((0,0), "ecothrifthome.com", font=lf(REG, 22))[2]
              d.text((W-url_w-30, 34), "ecothrifthome.com", font=lf(REG, 22), fill=palette["muted"])

              # Topic illustration
              detect_and_draw(d, slug, W//2, 380, palette)

              # Eyebrow
              eyebrow = pin.get("eyebrow", "Energy Saving").upper()
              d.text((50, 730), eyebrow, font=lf(BOLD, 26), fill=palette["accent"])

              # Headline
              lines = wrap_text(d, pin["headline"], lf(BOLD, 80), W-80)
              y = 776
              for line in lines:
                  lw = d.textbbox((0,0), line, font=lf(BOLD, 80))[2]
                  d.text(((W-lw)//2, y), line, font=lf(BOLD, 80), fill=palette["text"])
                  y += 90

              # Divider
              d.rounded_rectangle([50, y+12, W-50, y+18], radius=4, fill=palette["accent"])
              y += 48

              # Subheading
              sub_lines = wrap_text(d, pin["subheading"], lf(REG, 32), W-100)
              for line in sub_lines:
                  lw = d.textbbox((0,0), line, font=lf(REG, 32))[2]
                  d.text(((W-lw)//2, y), line, font=lf(REG, 32), fill=palette["muted"])
                  y += 44

              # Savings box
              d.rounded_rectangle([50, H-310, W-50, H-200], radius=16, fill=palette["dark"])
              sv = f"Save up to ${savings}/yr"
              svw = d.textbbox((0,0), sv, font=lf(BOLD, 50))[2]
              d.text(((W-svw)//2, H-288), sv, font=lf(BOLD, 50), fill=palette["accent"])

              # CTA
              d.rounded_rectangle([50, H-185, W-50, H-95], radius=14, fill=palette["accent"])
              cta = "Read the Full Guide"
              ctw = d.textbbox((0,0), cta, font=lf(BOLD, 36))[2]
              d.text(((W-ctw)//2, H-170), cta, font=lf(BOLD, 36), fill=palette["dark"])

              # Upload to Cloudinary
              buf = BytesIO()
              img.save(buf, format="PNG")
              buf.seek(0)

              public_id = f"ecothrift-pins/{slug}-pin-{i}"
              upload_resp = requests.post(
                  f"https://api.cloudinary.com/v1_1/{cloud_name}/image/upload",
                  files={"file": (f"{slug}-pin-{i}.png", buf, "image/png")},
                  data={"upload_preset": "ml_default", "public_id": public_id},
                  auth=(api_key, api_secret)
              )
              upload_data = upload_resp.json()
              image_url = upload_data.get("secure_url", "")
              print(f"Pin {i} uploaded to Cloudinary: {image_url}")

              if not image_url:
                  print(f"Cloudinary error: {upload_data}")
                  continue

              # Fire correct Pabbly webhook
              webhook_url = webhook_url_1 if i == 1 else webhook_url_2
              payload = {
                  "title":       pin["headline"],
                  "description": pin["description"],
                  "image_url":   image_url,
                  "post_url":    post_url,
                  "board_id":    board_id
              }
              resp = requests.post(webhook_url, json=payload)
              print(f"Pin {i} fired to webhook {i}: {resp.status_code} — {resp.text[:100]}")

              if i < len(pins):
                  print("Waiting 60 seconds before next pin...")
                  time.sleep(60)

          print("All 2 Pinterest pins posted successfully")
          PINEOF
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ZAPIER_WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}
          ZAPIER_WEBHOOK_URL_2: ${{ secrets.ZAPIER_WEBHOOK_URL_2 }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Commit and push
        run: |
          FILENAME=$(cat /tmp/post_filename.txt)
          git config user.email "claude-bot@ecothrifthome.com"
          git config user.name "Claude Bot"
          git add .
          git commit -m "Auto post: $FILENAME"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.CLAUDE_PAT }}
      - name: Notify Google Indexing API
        run: |
          pip install google-auth requests --quiet
          python3 << 'PYEOF'
          import json, requests, os
          from google.oauth2 import service_account

          filename = open("/tmp/post_filename.txt").read().strip()
          key = json.loads(os.environ["GOOGLE_INDEXING_KEY"])
          creds = service_account.Credentials.from_service_account_info(
              key, scopes=["https://www.googleapis.com/auth/indexing"]
          )
          import google.auth.transport.requests
          auth_req = google.auth.transport.requests.Request()
          creds.refresh(auth_req)

          url = f"https://ecothrifthome.com/blog/{filename}"
          resp = requests.post(
              "https://indexing.googleapis.com/v3/urlNotifications:publish",
              headers={"Authorization": f"Bearer {creds.token}"},
              json={"url": url, "type": "URL_UPDATED"}
          )
          print(f"Indexed: {url} — {resp.status_code}")
          PYEOF
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
