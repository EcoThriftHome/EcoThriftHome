name: Claude Blog Post

on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'File name (e.g. my-post.html)'
        required: true

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CLAUDE_PAT }}
      - name: Download post file
        run: |
          curl -L "${{ github.event.inputs.filename }}" -o "blog/$(basename '${{ github.event.inputs.filename }}')"
      - name: Commit and push
        run: |
          git config user.email "claude-bot@ecothrifthome.com"
          git config user.name "Claude Bot"
          git add .
          git commit -m "New post: $(basename '${{ github.event.inputs.filename }}')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.CLAUDE_PAT }}
