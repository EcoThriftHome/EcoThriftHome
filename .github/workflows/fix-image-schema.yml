name: Fix Image Schema

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CLAUDE_PAT }}

      - name: Fix missing image schema in all blog posts
        run: |
          python3 << 'PYEOF'
          import re, os, glob

          blog_dir = "blog"
          fixed_count = 0
          file_count = 0

          product_open = re.compile(
              r'(<div class="product-rec"[^>]*itemtype="https://schema.org/Product"[^>]*>)'
              r'(?!\s*<meta itemprop="image")'
          )

          image_meta = '<meta itemprop="image" content="https://ecothrifthome.com/images/placeholder-product.jpg">'

          html_files = glob.glob(os.path.join(blog_dir, "*.html"))
          print(f"Found {len(html_files)} blog post files")

          for filepath in html_files:
              with open(filepath, "r", encoding="utf-8") as f:
                  content = f.read()

              original = content

              new_content = product_open.sub(
                  lambda m: m.group(1) + "\n          " + image_meta,
                  content
              )

              if new_content != original:
                  with open(filepath, "w", encoding="utf-8") as f:
                      f.write(new_content)
                  fixes = len(product_open.findall(original))
                  fixed_count += fixes
                  file_count += 1
                  print(f"  Fixed {fixes} product block(s) in: {os.path.basename(filepath)}")
              else:
                  print(f"  OK: {os.path.basename(filepath)}")

          print(f"Done. Fixed {fixed_count} missing image tags across {file_count} files.")
          PYEOF

      - name: Commit fixes
        run: |
          git config user.email "claude-bot@ecothrifthome.com"
          git config user.name "Claude Bot"
          git add blog/
          git diff --staged --quiet || git commit -m "Fix: add missing image schema to all product blocks"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.CLAUDE_PAT }}
